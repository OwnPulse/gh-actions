name: Docker Build & Push
description: Build and push a Docker image to GitHub Container Registry

inputs:
  context:
    description: Docker build context directory
    required: true
  file:
    description: Path to the Dockerfile (relative to context)
    required: false
    default: ""
  image-name:
    description: Image name (without registry prefix)
    required: true
  tag:
    description: Image tag
    required: true
  registry:
    description: Container registry
    required: false
    default: ghcr.io

runs:
  using: composite
  steps:
    - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        push: true
        tags: ${{ inputs.registry }}/ownpulse/${{ inputs.image-name }}:${{ inputs.tag }}
