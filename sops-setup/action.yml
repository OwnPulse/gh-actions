name: SOPS Setup
description: Install SOPS and configure age key for decryption

inputs:
  age-key:
    description: SOPS age key content
    required: true
  sops-version:
    description: SOPS version to install
    required: false
    default: '3.12.2'

runs:
  using: composite
  steps:
    - name: Install and configure SOPS
      shell: bash
      run: |
        INSTALL_DIR="${HOME}/.local/bin"
        mkdir -p "$INSTALL_DIR"
        case "$(uname -s)-$(uname -m)" in
          Linux-x86_64)  SUFFIX="linux.amd64" ;;
          Linux-aarch64) SUFFIX="linux.arm64" ;;
          Darwin-arm64)  SUFFIX="darwin.arm64" ;;
          Darwin-x86_64) SUFFIX="darwin.amd64" ;;
          *) echo "Unsupported platform: $(uname -s)-$(uname -m)" && exit 1 ;;
        esac
        curl -fsSL "https://github.com/getsops/sops/releases/download/v${{ inputs.sops-version }}/sops-v${{ inputs.sops-version }}.${SUFFIX}" -o "$INSTALL_DIR/sops"
        chmod +x "$INSTALL_DIR/sops"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        mkdir -p "$HOME/.config/sops/age"
        echo "${{ inputs.age-key }}" > "$HOME/.config/sops/age/keys.txt"
