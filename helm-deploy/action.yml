name: Helm Deploy
description: Deploy a Helm chart with rollout verification and automatic rollback

inputs:
  release-name:
    description: Helm release name
    required: true
  chart-path:
    description: Path to Helm chart
    required: true
  namespace:
    description: Kubernetes namespace
    required: true
  image-tag:
    description: Container image tag to deploy
    required: true
  values-file:
    description: Values file path (optional, for staging overrides)
    required: false
    default: ''
  deployment-name:
    description: Full deployment name for rollout status check
    required: true
  timeout:
    description: Rollout timeout
    required: false
    default: '120s'

runs:
  using: composite
  steps:
    - name: Clean up stuck release ${{ inputs.release-name }}
      shell: bash
      run: |
        STATUS=$(helm status ${{ inputs.release-name }} -n ${{ inputs.namespace }} -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
        if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
          echo "Release ${{ inputs.release-name }} is stuck in $STATUS, rolling back"
          helm rollback ${{ inputs.release-name }} -n ${{ inputs.namespace }} 2>/dev/null || \
            helm uninstall ${{ inputs.release-name }} -n ${{ inputs.namespace }} 2>/dev/null || true
        fi

    - name: Clear kubectl field manager conflicts
      shell: bash
      run: |
        # After rollbacks, kubectl takes ownership of fields that Helm manages.
        # Re-apply the deployment server-side with Helm's field manager to reclaim ownership.
        kubectl get deployment ${{ inputs.deployment-name }} -n ${{ inputs.namespace }} -o yaml 2>/dev/null | \
          kubectl apply --server-side --force-conflicts --field-manager='helm' -f - 2>/dev/null || true

    - name: Deploy ${{ inputs.release-name }}
      shell: bash
      run: |
        VALUES_ARG=""
        if [ -n "${{ inputs.values-file }}" ]; then
          VALUES_ARG="-f ${{ inputs.values-file }}"
        fi
        helm upgrade --install ${{ inputs.release-name }} ${{ inputs.chart-path }} \
          -n ${{ inputs.namespace }} \
          $VALUES_ARG \
          --set "image.tag=${{ inputs.image-tag }}" \
          --atomic --timeout ${{ inputs.timeout }}
