name: Coverage Badge
description: Generate a coverage badge and deploy to the badges branch

inputs:
  percentage:
    description: Coverage percentage
    required: true
  label:
    description: Badge label (e.g. "backend coverage")
    required: true
  badge-file:
    description: Badge JSON filename (e.g. "backend-coverage.json")
    required: true

runs:
  using: composite
  steps:
    - name: Generate badge
      shell: bash
      run: |
        COV="${{ inputs.percentage }}"
        if [ "$(echo "$COV >= 70" | bc -l)" -eq 1 ]; then
          COLOR="brightgreen"
        elif [ "$(echo "$COV >= 50" | bc -l)" -eq 1 ]; then
          COLOR="yellow"
        else
          COLOR="red"
        fi
        mkdir -p /tmp/badges
        cat > /tmp/badges/${{ inputs.badge-file }} << BADGE
        {
          "schemaVersion": 1,
          "label": "${{ inputs.label }}",
          "message": "${COV}%",
          "color": "${COLOR}"
        }
        BADGE

    - name: Deploy badge to badges branch
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git stash --include-untracked || true
        if git fetch origin badges 2>/dev/null; then
          git checkout -B badges origin/badges
        else
          git checkout --orphan badges
          git rm -rf . 2>/dev/null || true
        fi
        cp /tmp/badges/${{ inputs.badge-file }} .
        git add ${{ inputs.badge-file }}
        git diff --cached --quiet || git commit -m "Update ${{ inputs.label }} badge"
        # Retry with rebase to handle concurrent badge pushes
        for attempt in 1 2 3; do
          git push origin badges && break
          echo "Push attempt $attempt failed, rebasing and retrying..."
          git fetch origin badges
          git rebase origin/badges
        done
