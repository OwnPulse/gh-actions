name: Coverage Comment
description: Post or update a coverage comment on a pull request

inputs:
  percentage:
    description: Coverage percentage
    required: true
  service:
    description: Service name for the comment header (e.g. "Backend", "Web")
    required: true
  coverage-type:
    description: Coverage metric type (e.g. "Line coverage", "Statement coverage")
    required: false
    default: 'Coverage'
  artifact-name:
    description: Name of the uploaded coverage artifact
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Comment coverage on PR
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
      with:
        script: |
          const percentage = '${{ inputs.percentage }}';
          const service = '${{ inputs.service }}';
          const coverageType = '${{ inputs.coverage-type }}';
          const artifactName = '${{ inputs.artifact-name }}';
          const artifactLink = artifactName
            ? `\n\n[Download full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) → Artifacts → ${artifactName}`
            : '';
          const body = `## ${service} Coverage\n\n**${coverageType}: ${percentage}%**${artifactLink}`;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.startsWith(`## ${service} Coverage`));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
